[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npx prisma generate 2>&1; timeout 60 npx prisma db push 2>&1; echo '=== Starting server on PORT='$PORT' ===' && npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
